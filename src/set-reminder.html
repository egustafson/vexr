<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Reminder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 1.5rem;
    }

    form {
      background: #fff;
      border-radius: 10px;
      padding: 1.75rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h1 { font-size: 1.25rem; color: #222; }

    label { font-size: .85rem; color: #555; display: block; margin-bottom: .25rem; }

    input[type="text"],
    input[type="datetime-local"],
    textarea,
    select {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: .95rem;
      font-family: inherit;
      background: #fafafa;
      color: #111;
    }

    textarea { resize: vertical; min-height: 60px; }

    .row { display: flex; gap: .75rem; }
    .row > div { flex: 1; }

    #status { font-size: .85rem; min-height: 1.2em; }
    #status.error { color: #c0392b; }
    #status.ok { color: #27ae60; }

    button[type="submit"] {
      padding: .6rem 1.25rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .95rem;
      cursor: pointer;
      align-self: flex-end;
    }
    button[type="submit"]:hover { background: #2563eb; }
    button[type="submit"]:disabled { background: #93c5fd; cursor: default; }
  </style>
</head>
<body>
  <form id="form">
    <h1>Set Reminder</h1>

    <div>
      <label for="title">Title *</label>
      <input type="text" id="title" required placeholder="What should I remind you?" />
    </div>

    <div>
      <label for="desc">Description (optional)</label>
      <textarea id="desc" placeholder="Additional details…"></textarea>
    </div>

    <div class="row">
      <div>
        <label for="when">Date &amp; Time *</label>
        <input type="datetime-local" id="when" required />
      </div>
      <div>
        <label for="recurrence">Recurrence</label>
        <select id="recurrence">
          <option value="Once">Once</option>
          <option value="Daily">Daily</option>
          <option value="Weekly">Weekly</option>
          <option value="Monthly">Monthly</option>
        </select>
      </div>
    </div>

    <div id="status"></div>

    <button type="submit" id="submit-btn">Save Reminder</button>
  </form>

  <script>
    const { invoke, window: tauriWindow } = window.__TAURI__;

    // Pre-fill datetime to "now + 1 hour" rounded to the minute
    const soon = new Date(Date.now() + 3600_000);
    soon.setSeconds(0, 0);
    document.getElementById('when').value = toLocalISOString(soon);

    // Pre-fill from edit params (if opened by manage-reminders)
    const params = new URLSearchParams(location.search);
    const editId = params.get('id');
    if (editId) {
      document.querySelector('h1').textContent = 'Edit Reminder';
      document.getElementById('submit-btn').textContent = 'Update Reminder';
      document.getElementById('title').value = decodeURIComponent(params.get('title') || '');
      document.getElementById('desc').value = decodeURIComponent(params.get('desc') || '');
      document.getElementById('recurrence').value = params.get('recurrence') || 'Once';
      const ts = params.get('triggerAt');
      if (ts) {
        const d = new Date(ts);
        document.getElementById('when').value = toLocalISOString(d);
      }
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.className = '';
      status.textContent = '';

      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('desc').value.trim() || null;
      const localVal = document.getElementById('when').value; // "YYYY-MM-DDTHH:mm"
      const triggerAt = new Date(localVal).toISOString();
      const recurrence = document.getElementById('recurrence').value;

      try {
        if (editId) {
          await invoke('update_reminder', { id: editId, title, description, triggerAt, recurrence });
        } else {
          await invoke('create_reminder', { title, description, triggerAt, recurrence });
        }
        status.className = 'ok';
        status.textContent = 'Saved!';
        setTimeout(() => tauriWindow.getCurrent().hide(), 600);
      } catch (err) {
        status.className = 'error';
        status.textContent = String(err);
        btn.disabled = false;
      }
    });

    function toLocalISOString(d) {
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
  </script>
</body>
</html>
